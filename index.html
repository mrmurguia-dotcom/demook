<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Contador de Comprobantes DEMO</title>

    <!-- 🔥 FAVICON (ICONO EN LA PESTAÑA) -->
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png?v=2">
    <link rel="shortcut icon" href="favicon-32x32.png?v=2">

    <!-- 📱 PWA / CELULAR -->
    <link rel="apple-touch-icon" href="apple-icon-180x180.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a5f">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- 🎨 Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 📄 PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        .drag-active { background-color: #f0fdf4; border-color: #22c55e; }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #3b82f6; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

<div class="max-w-5xl mx-auto p-6 pt-10">

    <!-- ENCABEZADO -->
    <div class="flex flex-col md:flex-row justify-between items-start mb-8 gap-4 border-b border-slate-200 pb-6">
        <div>
            <h1 class="text-3xl font-extrabold text-blue-900 mb-1">Contador de Comprobantes DEMO</h1>
            <p class="text-slate-500 font-medium">by M2 Consultoria Digital</p>
            <p class="text-sm text-slate-400 mt-2 italic">Procesamiento local de Facturas y Remitos</p>
        </div>

        <div class="bg-white p-2 rounded-lg shadow-sm border">
            <img src="logom2.jpg" class="h-16">
        </div>
    </div>

    <!-- DROP ZONE -->
    <div id="dropZone" class="bg-white border-2 border-dashed border-slate-300 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 mb-6">
        <p class="text-xl font-semibold">Arrastra PDFs aquí</p>
        <p class="text-sm text-slate-500 mt-2">o haz clic</p>
        <input type="file" id="fileInput" accept="application/pdf" multiple class="hidden">
    </div>

    <div id="messageBox" class="hidden mb-6 p-4 rounded-xl text-sm font-bold"></div>

    <div id="loadingIndicator" class="hidden flex flex-col items-center py-12">
        <div class="spinner mb-4"></div>
        <p class="text-blue-700 font-bold">PROCESANDO...</p>
    </div>

    <!-- RESULTADOS -->
    <div id="resultsContainer" class="hidden">
        <button onclick="exportToCSV()" class="bg-green-500 text-white px-4 py-2 rounded mb-4">
            Exportar CSV
        </button>
        <div id="groupedTablesContainer"></div>
    </div>

</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const resultsContainer = document.getElementById('resultsContainer');
const groupedTablesContainer = document.getElementById('groupedTablesContainer');
const loadingIndicator = document.getElementById('loadingIndicator');

let groupedDataStore = {};

dropZone.onclick = () => fileInput.click();

fileInput.onchange = () => handleFiles(fileInput.files);

async function handleFiles(files) {
    resultsContainer.classList.add('hidden');
    loadingIndicator.classList.remove('hidden');
    groupedTablesContainer.innerHTML = '';
    groupedDataStore = {};

    let allDocsMap = {};

    for (let file of files) {
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const text = (await page.getTextContent()).items.map(x => x.str).join(' ');

            const docMatch = text.match(/Nro.*?(\d{4,5}\s*-\s*\d{8})/);

            if (docMatch) {
                const num = docMatch[1];

                if (!allDocsMap[num]) {
                    allDocsMap[num] = {
                        numero: num,
                        cajas: 0
                    };
                }

                const cajas = text.match(/Total Cajas.*?([\d.,]+)/);
                if (cajas) {
                    allDocsMap[num].cajas += parseFloat(cajas[1].replace('.', '').replace(',', '.'));
                }
            }
        }
    }

    groupedTablesContainer.innerHTML = Object.values(allDocsMap).map(d =>
        `<div class="bg-white p-4 mb-2 shadow rounded">
            ${d.numero} - ${d.cajas}
        </div>`
    ).join('');

    resultsContainer.classList.remove('hidden');
    loadingIndicator.classList.add('hidden');
}

function exportToCSV() {
    let csv = "Numero;Cajas\n";
    Object.values(groupedDataStore).forEach(d => {
        csv += `${d.numero};${d.cajas}\n`;
    });

    const blob = new Blob([csv]);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "reporte.csv";
    a.click();
}
</script>

</body>
</html>
