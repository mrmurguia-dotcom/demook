<script>
let MAESTRA = {};
let STOCK_LEGACY = [];
let DATA_SESION = [];

let html5QrCode = null;
let tempItem = null;

const synth = window.speechSynthesis;

// =========================
// 🔵 LOCAL STORAGE
// =========================

function guardarLocal() {
    localStorage.setItem("MAESTRA", JSON.stringify(MAESTRA));
}

function cargarLocal() {
    const data = localStorage.getItem("MAESTRA");
    if(data) {
        MAESTRA = JSON.parse(data);
        console.log("MAESTRA cargada desde localStorage");
    }
}

// Cargar al iniciar
cargarLocal();

// =========================
// 🔵 VOZ
// =========================

function hablar(texto) {
    if (!('speechSynthesis' in window)) return;
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(texto);
    utter.lang = 'es-ES';
    synth.speak(utter);
}

// =========================
// 🔵 IMPORTAR EXCEL
// =========================

function importarExcel() {
    const fileInput = document.getElementById('upload-excel');
    const file = fileInput.files[0];
    if(!file) return alert("Selecciona un archivo primero.");

    const reader = new FileReader();

    reader.onload = function(e) {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });

            const hojaD = workbook.SheetNames.find(n => n.trim().toLowerCase() === "datos");
            const hojaL = workbook.SheetNames.find(n => n.trim().toLowerCase() === "legacy vstockpt");

            if(!hojaD) throw new Error("No se encontró la pestaña 'Datos'.");

            const wsD = workbook.Sheets[hojaD];
            const rowsD = XLSX.utils.sheet_to_json(wsD);

            MAESTRA = {};

            rowsD.forEach(r => {
                const cleanedRow = {};
                Object.keys(r).forEach(key => cleanedRow[key.trim().toUpperCase()] = r[key]);

                const cdb = String(cleanedRow["CDB"] || "").trim();

                if(cdb) {
                    MAESTRA[cdb] = {
                        sku: cleanedRow["ART."] || cleanedRow["SKU"],
                        desc: cleanedRow["DESCRIPCION"],
                        uxc: cleanedRow["UNIDADES X CAJA"] || 1
                    };
                }
            });

            // 🔥 Guardar también lo importado
            guardarLocal();

            if(hojaL) {
                const wsL = workbook.Sheets[hojaL];
                STOCK_LEGACY = XLSX.utils.sheet_to_json(wsL);
            }

            hablar("Planilla lista");
            alert("Cargados " + Object.keys(MAESTRA).length + " códigos.");

        } catch(err) {
            alert("Error al procesar: " + err.message);
        }
    };

    reader.readAsArrayBuffer(file);
}

// =========================
// 🔵 SCANNER
// =========================

async function toggleScanner() {
    const cont = document.getElementById('scanner-container');

    if(!html5QrCode) {
        cont.classList.remove('hidden');

        html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 15, qrbox: 250 },
            (text) => {
                procesarDato(text);

                html5QrCode.stop().then(() => {
                    html5QrCode = null;
                    cont.classList.add('hidden');
                });
            }
        );

    } else {
        html5QrCode.stop().then(() => {
            html5QrCode = null;
            cont.classList.add('hidden');
        });
    }
}

function buscarManual() {
    const val = document.getElementById('cdb-manual').value.trim();
    if(val) procesarDato(val);
}

// =========================
// 🔵 PROCESAR CDB
// =========================

function procesarDato(cdb) {
    const item = MAESTRA[cdb];

    if(!item) {
        hablar("No encontrado");

        const confirmar = confirm("Código no existe. ¿Deseas registrarlo?");
        if(!confirmar) return;

        const sku = prompt("Ingresar SKU:");
        if(!sku) return;

        const desc = prompt("Ingresar Descripción:");
        if(!desc) return;

        MAESTRA[cdb] = {
            sku: sku,
            desc: desc,
            uxc: 1
        };

        // 🔥 Guardar en localStorage
        guardarLocal();

        hablar("Producto registrado");

        tempItem = MAESTRA[cdb];
    } else {
        tempItem = item;
    }

    document.getElementById('display-sku').innerText = `SKU: ${tempItem.sku}`;
    document.getElementById('display-desc').innerText = tempItem.desc;
    document.getElementById('panel-control').classList.remove('hidden');

    hablar("Ese Ka U " + String(tempItem.sku).split('').join(' '));
}

// =========================
// 🔵 REGISTRAR
// =========================

function registrarFinal() {
    const cant = parseInt(document.getElementById('cant-manual').value);
    if(!tempItem || isNaN(cant)) return;

    const loteRow = STOCK_LEGACY.find(f => 
        String(f['SKU'] || f['articulo'] || '').trim() === String(tempItem.sku).trim() && 
        String(f['TIPO'] || '').trim().toUpperCase() === "PICK"
    );

    DATA_SESION.unshift({
        Ubicacion: "UNIDADES",
        SKU: tempItem.sku,
        Descripción: tempItem.desc,
        "Lote/ serie": loteRow ? loteRow['Lote'] : "SIN LOTE",
        Cantidad_UN: cant,
        UN: "UN",
        Cantidad_CA: (cant / tempItem.uxc).toFixed(2),
        CA: "CA"
    });

    actualizarHistorial();
    hablar("Registrado");
    resetPanel();
}

// =========================
// 🔵 ELIMINAR ITEM
// =========================

function eliminarItem(index) {
    const confirmar = confirm("¿Eliminar este registro?");
    if(!confirmar) return;

    DATA_SESION.splice(index, 1);
    actualizarHistorial();
    hablar("Eliminado");
}

// =========================
// 🔵 UI
// =========================

function resetPanel() {
    document.getElementById('panel-control').classList.add('hidden');
    document.getElementById('cdb-manual').value = "";
    document.getElementById('cant-manual').value = "1";
}

function actualizarHistorial() {
    document.getElementById('counter').innerText = `${DATA_SESION.length} ITEMS`;

    document.getElementById('history').innerHTML = DATA_SESION.map((d, index) => `
        <div class="flex justify-between items-center bg-gray-50 p-3 rounded-lg border-l-4 border-blue-500 mb-2">
            
            <div class="flex-1">
                <span class="text-[10px] font-bold text-gray-400 block">${d.SKU}</span>
                <span class="text-xs font-bold text-blue-900">${d.Descripción}</span>
            </div>

            <div class="text-right mr-3">
                <span class="text-xl font-black text-green-600">${d.Cantidad_UN}</span>
                <span class="text-[8px] font-bold block text-gray-400">UN</span>
            </div>

            <button onclick="eliminarItem(${index})"
                class="bg-red-500 text-white px-2 py-1 rounded-lg text-xs font-bold">
                ❌
            </button>

        </div>
    `).join('');
}

// =========================
// 🔵 EXPORTAR
// =========================

function exportarExcel() {
    const ws = XLSX.utils.json_to_sheet(DATA_SESION);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Inventario");
    XLSX.writeFile(wb, "Inventario_UNIDADES.xlsx");
}
</script>
