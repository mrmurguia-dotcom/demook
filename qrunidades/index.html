<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR INVENTARIO AZA (UNIDADES)</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { font-family: 'Segoe UI', sans-serif; background:#f3f6f9; padding-bottom:120px; }
.aza-card { background:white; border-radius:12px; padding:1.5rem; margin-bottom:1rem; }
.btn { padding:12px; border-radius:8px; width:100%; font-weight:bold; }
.mic-float { position:fixed; bottom:25px; right:25px; width:70px; height:70px; background:#3b82f6; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.mic-float.listening { background:#ef4444; }
</style>
</head>

<body class="max-w-lg mx-auto p-4">

<h1 class="text-2xl font-black text-center mb-4">QR INVENTARIO AZA (UNIDADES)</h1>

<div class="aza-card">
<input type="file" id="upload-excel" class="mb-2 w-full">
<button onclick="importarExcel()" class="btn bg-blue-900 text-white">CARGAR EXCEL</button>
</div>

<div class="aza-card">
<button onclick="toggleScanner()" class="btn bg-blue-500 text-white">📷 ESCANEAR</button>
<div id="reader" class="mt-2"></div>

<div class="flex gap-2 mt-3">
<input id="cdb-manual" class="border p-2 w-full" placeholder="Código">
<button onclick="buscarManual()">OK</button>
</div>
</div>

<div id="panel-control" class="aza-card hidden text-center">
<div id="display-desc"></div>
<h2 id="display-sku" class="text-xl font-bold"></h2>

<input id="cant-manual" type="number" value="1" class="text-center text-2xl w-full mt-3">

<button onclick="registrarFinal()" class="btn bg-green-600 text-white mt-3">Registrar</button>
<button onclick="resetPanel()" class="text-red-500 mt-2">Cancelar</button>
</div>

<div class="aza-card">
<div id="counter">0 ITEMS</div>
<div id="history"></div>
<button onclick="exportarExcel()" class="btn bg-green-700 text-white mt-3">DESCARGAR</button>
</div>

<audio id="beep-audio" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3"></audio>

<div id="mic-btn" class="mic-float" onclick="activarVoz()">
<svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
</svg>
</div>

<script>
// (todo el JS igual que el anterior)
</script>

</body>
</html>
