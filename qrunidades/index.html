<body class="p-4 max-w-lg mx-auto">

<header class="text-center mb-6 mt-4">
    <h1 class="text-2xl font-black">QR INVENTARIO AZA (UNIDADES)</h1>
</header>

<div class="aza-card">
    <input type="file" id="upload-excel" accept=".xlsx, .xls" class="input-archivo-excel">
    <button onclick="importarExcel()" class="btn-cargar-planilla">CARGAR PLANILLA</button>
</div>

<div class="aza-card">
    <button onclick="toggleScanner()" class="w-full btn-scan py-4 mb-4">📷 Escanear</button>
    <div id="scanner-container" class="hidden"><div id="reader"></div></div>

    <input type="text" id="cdb-manual" placeholder="Código" class="border p-2 w-full">
    <button onclick="buscarManual()">OK</button>
</div>
```

</div>

<div id="panel-control" class="aza-card hidden">
    <div class="text-center">
        <span id="display-desc"></span>
        <h2 id="display-sku"></h2>

```
    <input type="number" id="cant-manual" value="1" class="text-center text-2xl w-full mt-3">
    <button onclick="registrarFinal()" class="bg-green-600 text-white w-full mt-3 p-3">Registrar</button>
    <button onclick="resetPanel()" class="text-red-500 mt-2">Cancelar</button>
</div>
```

</div>

<div class="aza-card">
    <div id="counter">0 ITEMS</div>
    <div id="history"></div>
    <button onclick="exportarExcel()" class="bg-green-700 text-white w-full mt-4 p-3">Descargar</button>
</div>

<div id="mic-btn" class="mic-float" onclick="activarVoz()">🎤</div>

<script>
let MAESTRA = {};
let STOCK_LEGACY = [];
let DATA_SESION = [];

let html5QrCode = null;
let tempItem = null;

const synth = window.speechSynthesis;

// ================= LOCAL STORAGE =================

function guardarLocal() {
    localStorage.setItem("MAESTRA", JSON.stringify(MAESTRA));
}

function cargarLocal() {
    const data = localStorage.getItem("MAESTRA");
    if(data) MAESTRA = JSON.parse(data);
}

cargarLocal();

// ================= VOZ =================

function hablar(texto) {
    if (!('speechSynthesis' in window)) return;
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(texto);
    utter.lang = 'es-ES';
    synth.speak(utter);
}

// ================= IMPORTAR =================

function importarExcel() {
    const file = document.getElementById('upload-excel').files[0];
    if(!file) return alert("Selecciona archivo");

    const reader = new FileReader();

    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });

        const hojaD = workbook.SheetNames.find(n => n.toLowerCase().includes("datos"));
        const ws = workbook.Sheets[hojaD];
        const rows = XLSX.utils.sheet_to_json(ws);

        MAESTRA = {};

        rows.forEach(r => {
            const cdb = String(r["CDB"] || "").trim();
            if(cdb) {
                MAESTRA[cdb] = {
                    sku: r["ART."] || r["SKU"],
                    desc: r["DESCRIPCION"],
                    uxc: r["UNIDADES X CAJA"] || 1
                };
            }
        });

        guardarLocal();
        alert("Cargados " + Object.keys(MAESTRA).length);
    };

    reader.readAsArrayBuffer(file);
}

// ================= SCAN =================

async function toggleScanner() {
    const cont = document.getElementById('scanner-container');

    if(!html5QrCode) {
        cont.classList.remove('hidden');
        html5QrCode = new Html5Qrcode("reader");

        html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10 },
            (text) => {
                procesarDato(text);
                html5QrCode.stop();
                html5QrCode = null;
                cont.classList.add('hidden');
            }
        );
    }
}

function buscarManual() {
    const val = document.getElementById('cdb-manual').value;
    if(val) procesarDato(val);
}

// ================= PROCESAR =================

function procesarDato(cdb) {
    let item = MAESTRA[cdb];

    if(!item) {
        if(confirm("No existe. ¿Registrar?")) {
            const sku = prompt("SKU:");
            const desc = prompt("Descripción:");

            if(sku && desc) {
                MAESTRA[cdb] = { sku, desc, uxc:1 };
                guardarLocal();
                item = MAESTRA[cdb];
            } else return;
        } else return;
    }

    tempItem = item;

    document.getElementById('display-sku').innerText = item.sku;
    document.getElementById('display-desc').innerText = item.desc;
    document.getElementById('panel-control').classList.remove('hidden');
}

// ================= REGISTRAR =================

function registrarFinal() {
    const cant = parseInt(document.getElementById('cant-manual').value);
    if(!tempItem || isNaN(cant)) return;

    DATA_SESION.unshift({
        SKU: tempItem.sku,
        Descripción: tempItem.desc,
        Cantidad_UN: cant
    });

    actualizarHistorial();
    resetPanel();
}

// ================= ELIMINAR =================

function eliminarItem(index) {
    if(confirm("Eliminar?")) {
        DATA_SESION.splice(index,1);
        actualizarHistorial();
    }
}

// ================= UI =================

function resetPanel() {
    document.getElementById('panel-control').classList.add('hidden');
}

function actualizarHistorial() {
    document.getElementById('counter').innerText = DATA_SESION.length + " ITEMS";

    document.getElementById('history').innerHTML = DATA_SESION.map((d,i)=>`
        <div class="flex justify-between border p-2 mt-2">
            <div>${d.SKU} - ${d.Descripción}</div>
            <div>
                ${d.Cantidad_UN}
                <button onclick="eliminarItem(${i})">❌</button>
            </div>
        </div>
    `).join('');
}

// ================= EXPORTAR =================

function exportarExcel() {
    const ws = XLSX.utils.json_to_sheet(DATA_SESION);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Inventario");
    XLSX.writeFile(wb, "Inventario.xlsx");
}

// ================= VOZ =================

function activarVoz() {
    alert("Voz activa (demo)");
}
</script>

</body>
</html>
